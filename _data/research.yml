areas:
  - id: domain-specific-nlp
    name:
      en: "Domain-Specific NLP for Indonesian Contexts"
      id: "NLP Spesifik Domain untuk Konteks Indonesia"
    definition:
      en: "Adapting NLP systems — sentiment analysis, semantic retrieval, and summarization — to specialized Indonesian domains where vocabulary, discourse, and relevance structure diverge from general-purpose corpora."
      id: "Mengadaptasi sistem NLP — sentiment analysis, semantic retrieval, dan summarization — ke domain Indonesia khusus di mana kosakata, wacana, dan struktur relevansi berbeda dari korpus umum."
    sub_areas:
      - id: theological-text
        name:
          en: "Theological text"
          id: "Teks teologi"
        definition:
          en: "Semantic retrieval and analysis for biblical and theological corpora in Indonesian."
          id: "Pencarian semantik dan analisis untuk korpus biblika dan teologi berbahasa Indonesia."
      - id: ecommerce-reviews
        name:
          en: "E-commerce reviews"
          id: "Review e-commerce"
        definition:
          en: "Sentiment and aspect-based analysis of Indonesian e-commerce product reviews."
          id: "Analisis sentimen dan berbasis aspek pada review produk e-commerce Indonesia."
      - id: educational-content
        name:
          en: "Educational content"
          id: "Konten pendidikan"
        definition:
          en: "Summarization, knowledge visualization, and sentiment in educational text and discourse."
          id: "Summarization, visualisasi pengetahuan, dan sentimen pada teks dan wacana pendidikan."
      - id: political-discourse
        name:
          en: "Political discourse"
          id: "Wacana politik"
        definition:
          en: "Sentiment and discourse analysis of Indonesian political conversation on social media."
          id: "Analisis sentimen dan wacana politik Indonesia di media sosial."
    ongoing_projects:
      - title:
          en: "Extractive Summarization for Mind Map Generation"
          id: "Extractive Summarization untuk Mind Map Generation"
        funding: "UPH Internal Grant"
        period: "May 2023 – May 2024"
        role:
          en: "Principal Investigator (completed)"
          id: "Ketua Peneliti (selesai)"
        description:
          en: "Prototype system combining Transformer-based extractive summarization and clustering to generate mind maps from scientific articles. Evaluated with human judges."
          id: "Prototipe sistem yang menggabungkan extractive summarization berbasis Transformer dan clustering untuk menghasilkan mind map dari artikel ilmiah. Dievaluasi oleh human judges."
    open_topics:
      - title:
          en: "Retrieval-Augmented Generation (RAG) for Indonesian theological corpora"
          id: "Retrieval-Augmented Generation (RAG) untuk korpus teologi Indonesia"
        prereq:
          en: "Transformers, RAG familiarity"
          id: "Transformers, familiar RAG"
        status: in-discussion
      - title:
          en: "Aspect-based sentiment on Indonesian marketplaces"
          id: "Aspect-based sentiment pada marketplace Indonesia"
        prereq:
          en: "Python, DL basics, scraping comfort"
          id: "Python, dasar DL, nyaman scraping"
        status: open
      - title:
          en: "Abstractive summarization for Indonesian scientific articles"
          id: "Abstractive summarization untuk artikel ilmiah Indonesia"
        prereq:
          en: "seq2seq models, Hugging Face"
          id: "Model seq2seq, Hugging Face"
        status: open

  - id: low-resource-languages
    name:
      en: "Low-Resource Indonesian Languages"
      id: "Bahasa Indonesia Low-Resource"
    definition:
      en: "Building corpora, benchmarks, and data curation frameworks for Indonesian local languages whose typological features and digital footprint are underrepresented in mainstream multilingual models."
      id: "Membangun korpus, benchmark, dan framework kurasi data untuk bahasa-bahasa lokal Indonesia yang fitur tipologisnya dan jejak digitalnya kurang terwakili dalam model multilingual mainstream."
    sub_areas:
      - id: corpus-construction
        name:
          en: "Corpus construction"
          id: "Konstruksi korpus"
        definition:
          en: "Designing and digitizing multi-domain text corpora, including OCR, cleaning, and native-speaker correction."
          id: "Perancangan dan digitisasi korpus teks multi-domain, termasuk OCR, pembersihan, dan koreksi penutur asli."
      - id: typological-transfer
        name:
          en: "Typological transfer"
          id: "Transfer tipologis"
        definition:
          en: "Cross-lingual transfer methods that account for typological differences between Indonesian and local languages."
          id: "Metode cross-lingual transfer yang memperhitungkan perbedaan tipologis antara bahasa Indonesia dan bahasa lokal."
      - id: data-curation-frameworks
        name:
          en: "Multi-dimensional data curation"
          id: "Kurasi data multi-dimensi"
        definition:
          en: "Frameworks for curating training corpora that capture relevance, quality, and linguistic enrichment dimensions."
          id: "Framework untuk mengkurasi korpus pelatihan yang menangkap dimensi relevansi, kualitas, dan pengayaan linguistik."
    ongoing_projects:
      - title:
          en: "Batak Toba Language Corpus"
          id: "Korpus Bahasa Batak Toba"
        funding: "UPH Internal Grant"
        period: "May 2025 – Dec 2025"
        role:
          en: "Principal Investigator"
          id: "Ketua Peneliti"
        description:
          en: "Multi-domain Batak Toba–Indonesian parallel corpus covering religious, cultural, educational, and contemporary text. End-to-end pipeline: collection, OCR, native-speaker correction, preprocessing."
          id: "Korpus paralel multi-domain Batak Toba–Indonesia mencakup teks religius, budaya, pendidikan, dan kontemporer. Pipeline end-to-end: pengumpulan, OCR, koreksi native speaker, preprocessing."
      - title:
          en: "CoRaL — Contextual Relevance and Linguistic Enrichment"
          id: "CoRaL — Contextual Relevance and Linguistic Enrichment"
        funding: "SEACrowd Apprentice 2026"
        period: "Feb 2026 – June 2026"
        role:
          en: "Apprentice"
          id: "Apprentice"
        description:
          en: "Multi-dimensional data curation framework for low-resource language training corpora, developed with collaborators at VinUniversity, MBZUAI, and Universitas Indonesia."
          id: "Framework kurasi data multi-dimensi untuk korpus pelatihan bahasa low-resource, dikembangkan bersama kolaborator di VinUniversity, MBZUAI, dan Universitas Indonesia."
    open_topics:
      - title:
          en: "Named Entity Recognition for Batak Toba"
          id: "Named Entity Recognition untuk Batak Toba"
        prereq:
          en: "PyTorch + Hugging Face"
          id: "PyTorch + Hugging Face"
        status: open
      - title:
          en: "Cross-lingual transfer from Indonesian to Batak Toba"
          id: "Cross-lingual transfer dari model Indonesia ke Batak Toba"
        prereq:
          en: "Transformers, basic DL"
          id: "Transformers, DL dasar"
        status: open
      - title:
          en: "Parallel corpus alignment evaluation"
          id: "Evaluasi alignment korpus paralel"
        prereq:
          en: "Python, corpus linguistics familiarity"
          id: "Python, familiar dengan corpus linguistics"
        status: open

  - id: bias-fairness
    name:
      en: "Bias & Fairness in Indonesian NLP"
      id: "Bias & Fairness pada NLP Indonesia"
    definition:
      en: "Investigating how bias manifests in Indonesian NLP datasets and models across axes salient to Indonesian society — ethnicity, region, dialect, and political discourse — where mainstream fairness frameworks developed for English contexts often do not transfer cleanly."
      id: "Investigasi bagaimana bias muncul pada dataset dan model NLP Indonesia di sumbu yang relevan dengan masyarakat Indonesia — etnis, daerah, dialek, dan wacana politik — di mana framework fairness mainstream yang dikembangkan untuk konteks Inggris seringkali tidak ditransfer dengan bersih."
    sub_areas:
      - id: dataset-bias-auditing
        name:
          en: "Dataset bias auditing"
          id: "Audit bias dataset"
        definition:
          en: "Systematic auditing of Indonesian NLP datasets for representation and label biases."
          id: "Audit sistematis dataset NLP Indonesia untuk bias representasi dan label."
      - id: fairness-metrics
        name:
          en: "Fairness metrics"
          id: "Metrik fairness"
        definition:
          en: "Quantitative fairness metrics adapted to Indonesian linguistic and demographic contexts."
          id: "Metrik fairness kuantitatif yang diadaptasi ke konteks linguistik dan demografis Indonesia."
      - id: error-analysis-mitigation
        name:
          en: "Error analysis & mitigation"
          id: "Analisis error & mitigasi"
        definition:
          en: "Diagnosing failure modes and proposing mitigation strategies grounded in Indonesian dataset realities."
          id: "Mendiagnosis mode kegagalan dan mengusulkan strategi mitigasi berbasis realitas dataset Indonesia."
    ongoing_projects:
      - title:
          en: "Bias Analysis in Indonesian QA Datasets (FACQA)"
          id: "Analisis Bias pada Dataset QA Indonesia (FACQA)"
        funding: "UPH Internal Grant"
        period: "May 2024 – Dec 2024"
        role:
          en: "Principal Investigator (completed)"
          id: "Ketua Peneliti (selesai)"
        description:
          en: "Investigated bias and fairness issues in FACQA using Transformer-based baselines and quantitative fairness metrics. Contributed recommendations for dataset documentation."
          id: "Investigasi isu bias dan fairness pada FACQA menggunakan baseline berbasis Transformer dan metrik fairness kuantitatif. Menghasilkan rekomendasi untuk dokumentasi dataset."
    open_topics:
      - title:
          en: "Fairness audits on Indonesian classification benchmarks"
          id: "Audit fairness pada benchmark klasifikasi Indonesia"
        prereq:
          en: "Comfort reading ML papers"
          id: "Nyaman membaca paper ML"
        status: open
      - title:
          en: "Dialect and regional bias in Indonesian language models"
          id: "Bias dialek dan daerah pada model bahasa Indonesia"
        prereq:
          en: "NLP course, basic statistics"
          id: "MK NLP, statistika dasar"
        status: open
      - title:
          en: "Data documentation standards for low-resource NLP"
          id: "Standar dokumentasi data untuk NLP low-resource"
        prereq:
          en: "Familiarity with dataset cards, datasheets"
          id: "Familiar dengan dataset cards, datasheets"
        status: open

  - id: applied-ml
    name:
      en: "Applied ML for Indonesian Data"
      id: "Applied ML untuk Data Indonesia"
    definition:
      en: "Practical machine learning across vision and tabular domains, with attention to settings where standard assumptions — abundant data, clean labels, representative distributions — do not hold in Indonesian or Southeast Asian contexts."
      id: "Machine learning praktis di domain vision dan tabular, dengan perhatian pada situasi di mana asumsi standar — data berlimpah, label bersih, distribusi representatif — tidak berlaku di konteks Indonesia atau Asia Tenggara."
    sub_areas:
      - id: computer-vision
        name:
          en: "Computer vision"
          id: "Computer vision"
        definition:
          en: "Image classification across medical imaging and document classification using CNN, Vision Transformers, and hybrid architectures."
          id: "Klasifikasi citra di medical imaging dan klasifikasi dokumen menggunakan CNN, Vision Transformers, dan arsitektur hybrid."
      - id: predictive-analytics
        name:
          en: "Predictive analytics"
          id: "Predictive analytics"
        definition:
          en: "Regression and classification on tabular data, often with explainable AI methods."
          id: "Regresi dan klasifikasi pada data tabular, seringkali dengan metode explainable AI."
      - id: exploratory-data-analysis
        name:
          en: "Exploratory data analysis"
          id: "Analisis data eksploratori"
        definition:
          en: "Statistical exploration and pattern discovery in Indonesian transportation, demographic, and behavioral data."
          id: "Eksplorasi statistik dan penemuan pola pada data transportasi, demografi, dan perilaku Indonesia."
      - id: ensemble-methods
        name:
          en: "Ensemble methods"
          id: "Metode ensemble"
        definition:
          en: "Tree-based ensembles and model combinations for tabular prediction tasks."
          id: "Ensemble berbasis tree dan kombinasi model untuk tugas prediksi tabular."
    open_topics:
      - title:
          en: "Applied CV for local Indonesian use cases"
          id: "Applied CV untuk use case Indonesia"
        prereq:
          en: "PyTorch, torchvision"
          id: "PyTorch, torchvision"
        status: open
      - title:
          en: "Explainable AI for Indonesian socioeconomic data"
          id: "Explainable AI untuk data sosioekonomi Indonesia"
        prereq:
          en: "Tabular ML, SHAP/LIME"
          id: "Tabular ML, SHAP/LIME"
        status: open
