<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ site.author.short_name }}</title>
  <meta http-equiv="refresh" content="0; url=/en/">
  <link rel="canonical" href="/en/">
  <script>
    // Prefer Indonesian if browser is set to id
    var lang = (navigator.language || navigator.userLanguage || "en").toLowerCase();
    if (lang.indexOf("id") === 0) {
      window.location.replace("/id/");
    } else {
      window.location.replace("/en/");
    }
  </script>
</head>
<body>
  <p>Redirecting… <a href="/en/">English</a> / <a href="/id/">Indonesia</a></p>
</body>
</html>
